{% extends 'base.html' %}
{% block content %}

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden animate-fade-in-up">
    <div class="px-8 pt-8 pb-6 text-center">
        <div class="w-14 h-14 bg-blue-50 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Welcome back</h2>
        <p class="text-gray-500 mt-1 text-sm font-medium">Please enter your details to sign in.</p>
    </div>

    <form method="post" class="px-8 pb-8 space-y-6" id="login-form">
        {% csrf_token %}
        
        <div class="django-form-wrapper space-y-4">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="w-full flex items-center justify-center gap-2 px-6 py-3.5 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-blue-700 hover:shadow-[0_8px_20px_0_rgba(37,99,235,0.3)] hover:-translate-y-0.5 transition-all duration-300 active:scale-95">
            Sign In
        </button>
        
        <p class="text-center text-sm text-gray-500 font-medium mt-6">
            Don't have an account? 
            <a href="{% url 'register' %}" class="text-primary hover:text-blue-700 font-bold transition-colors">Register here</a>
        </p>
    </form>
</div>

<style>
    .django-form-wrapper p { display: flex; flex-direction: column; margin-bottom: 1rem; }
    .django-form-wrapper label { font-size: 0.875rem; font-weight: 700; color: #374151; margin-bottom: 0.5rem; }
    .django-form-wrapper input {
        width: 100%; padding: 0.75rem 1rem; font-size: 0.875rem; color: #1f2937;
        background-color: #f8fafc; border: 1px solid #e5e7eb; border-radius: 0.75rem;
        transition: all 0.3s ease;
    }
    .django-form-wrapper input:focus {
        outline: none; border-color: #2563eb; background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }
    .django-form-wrapper .helptext { font-size: 0.75rem; color: #6b7280; margin-top: 0.375rem; }
    .django-form-wrapper .errorlist { color: #ef4444; font-size: 0.875rem; font-weight: 600; list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
</style>

{% endblock %}
