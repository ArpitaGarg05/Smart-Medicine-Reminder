{% extends 'base.html' %}
{% block content %}

<div class="max-w-3xl mx-auto animate-fade-in-up">

    <!-- HEADER -->
    <div class="mb-10 text-center">
        <div class="w-16 h-16 bg-blue-100 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm hover:scale-110 transition">
            📤
        </div>
        <h2 class="text-3xl font-bold text-gray-900">Upload Prescription</h2>
        <p class="text-gray-500 text-sm mt-2">Upload and let AI extract medicines automatically</p>
    </div>

    <!-- CARD -->
    <div class="bg-white rounded-2xl shadow border overflow-hidden hover:shadow-lg transition">

        <form method="post" enctype="multipart/form-data" class="p-8 space-y-6" id="upload-form">
            {% csrf_token %}

            <!-- DROPZONE -->
            <div id="dropzone"
                class="border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center cursor-pointer transition hover:border-blue-400 hover:bg-blue-50">

                <div class="mb-4 text-4xl">📄</div>

                <p class="font-semibold text-gray-700">Drag & drop your prescription</p>
                <p class="text-sm text-gray-400 mt-1">or click to browse</p>

                <div class="mt-4">
                    {{ form.as_p }}
                </div>

                <p class="text-xs text-gray-400 mt-4">JPG, PNG (Max 5MB)</p>
            </div>

            <!-- PREVIEW -->
            <div id="preview-container" class="hidden">
                <p class="text-sm font-bold text-gray-700 mb-2">Preview</p>

                <div class="rounded-xl overflow-hidden border bg-gray-50 p-2">
                    <img id="image-preview" class="max-h-72 mx-auto rounded-lg shadow">
                </div>
            </div>

            <!-- SUBMIT -->
            <button type="submit" id="submitBtn"
                class="w-full py-3 rounded-xl bg-blue-500 text-white font-bold hover:bg-blue-600 transition flex justify-center items-center gap-2">

                <span id="btnText">Upload & Parse</span>

                <svg id="loader" class="w-4 h-4 hidden animate-spin" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="white" stroke-width="4" fill="none"/>
                </svg>

            </button>

        </form>
    </div>
</div>

<!-- JS -->
<script>
const fileInput = document.querySelector("input[type='file']");
const dropzone = document.getElementById("dropzone");
const preview = document.getElementById("preview-container");
const img = document.getElementById("image-preview");

// click upload
dropzone.addEventListener("click", () => fileInput.click());

// drag events
dropzone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropzone.classList.add("bg-blue-50", "border-blue-400");
});

dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("bg-blue-50", "border-blue-400");
});

dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("bg-blue-50", "border-blue-400");

    const file = e.dataTransfer.files[0];
    fileInput.files = e.dataTransfer.files;
    showPreview(file);
});

// preview
fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    showPreview(file);
});

function showPreview(file) {
    if (file && file.type.startsWith("image")) {
        const reader = new FileReader();
        reader.onload = (e) => {
            img.src = e.target.result;
            preview.classList.remove("hidden");
        };
        reader.readAsDataURL(file);
    }
}

// loading button
document.getElementById("upload-form").addEventListener("submit", () => {
    document.getElementById("btnText").innerText = "Processing...";
    document.getElementById("loader").classList.remove("hidden");
});
</script>

<style>
.animate-fade-in-up {
    animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

{% endblock %}
